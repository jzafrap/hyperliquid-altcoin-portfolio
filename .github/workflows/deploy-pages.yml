name: Deploy to GitHub Pages

on:
  push:
    branches: [main]
  workflow_dispatch: {}

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    env:
      BASE_PATH: /hyperliquid-altcoin-portfolio
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - run: npm ci

      - run: npm run typecheck

      - run: npm test

      - name: Build testnet bundle
        run: npx vite build --base="$BASE_PATH/testnet/" --outDir dist/testnet
        env:
          VITE_HL_NETWORK: testnet

      - name: Build mainnet bundle
        run: npx vite build --base="$BASE_PATH/mainnet/" --outDir dist/mainnet
        env:
          VITE_HL_NETWORK: mainnet

      - name: Add landing page
        run: cp deploy/pages-index.html dist/index.html

      - uses: actions/upload-pages-artifact@v3
        with:
          path: dist

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - id: deployment
        uses: actions/deploy-pages@v4
